<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Write JSON Test</title>

    <link
        rel="stylesheet"
        href="css/app.css">
</head>
<body>

    <h1>Write JSON Test</h1>

    <label>
        Path
    </label>

    <input
        id="path"
        value="data/settings.json">

    <label>
        JSON Content
    </label>

    <textarea id="json">
{
    "name": "Test",
    "value": 123,
    "items":
    [
        1,
        2,
        3
    ]
}
    </textarea>

    <br>

    <button id="writeButton">
        Write File
    </button>

<h2>Upload File</h2>

<label>
    Destination Path
</label>

<input
    id="uploadPath"
    value="uploads/test.bin">

<label>
    File
</label>

<input
    id="uploadFile"
    type="file">

<br>

<button id="uploadButton">
    Upload File
</button>


    <h2>API Result</h2>

    <pre id="result"></pre>

    <h2>Loaded data/settings.json</h2>

    <pre id="settings"></pre>

    <script src="js/app.js"></script>

</body>
</html>
